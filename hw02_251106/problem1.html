<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Problem 1</title>
  <link type="text/css" rel="stylesheet" href="home.css">
</head>

<body>
  <h4 class="hint">
    book 객체 배열을 for 반복문을 사용하여 동적 테이블을 작성합니다.<br>
    thead 부분을 먼저 작성하고 난 후 tbody 부분을 완성합니다.<br>
    thead와 tbody를 생성할 때 document.write를 활용해야 합니다.<br>
  </h4>

  <script>
    const bookList = [
      { isbn:'101', title:"HTML5", name:"버너스 리", publisher:"한빛 미디어", pub_date:"2018/08/31", num_page:544 },
      { isbn:'102', title:"자바 스크립트", name:"브랜든 아이크", publisher:"생능", pub_date:"2021/09/26", num_page:625 },
      { isbn:'103', title:"리액트 프로그래밍", name:"조던 워커", publisher:"인피니티", pub_date:"2023/02/17", num_page:234 },
      { isbn:'104', title:"스프링 프레임워크", name:"로드 존슨", publisher:"동아 출판사", pub_date:"2022/04/08", num_page:355 },
      { isbn:'105', title:"플라스크", name:"홀로바티", publisher:"홍릉", pub_date:"2024/10/19", num_page:782 },
      { isbn:'106', title:"솔리디티", name:"가빈 우드", publisher:"인사이트", pub_date:"2023/05/01", num_page:134 },
      { isbn:'107', title:"비트코인", name:"사토시", publisher:"에이콘 출판사", pub_date:"2021/01/31", num_page:255 }
    ];

    document.write("<table>");
    
    // thead
    document.write("<thead>");
    document.write("<tr>");
    document.write("<th>ISBN</th>");
    document.write("<th>책 제목</th>");
    document.write("<th>지은이</th>");
    document.write("<th>출판사</th>");
    document.write("<th>발행 날짜</th>");
    document.write("<th>총 페이지</th>");
    document.write("</tr>");
    document.write("</thead>");

    // tbody
    document.write("<tbody>");
    for (let i = 0; i < bookList.length; i++) {
      const book = bookList[i];
      document.write("<tr>");
      document.write("<td>" + book.isbn + "</td>");
      document.write("<td>" + book.title + "</td>");
      document.write("<td>" + book.name + "</td>");
      document.write("<td>" + book.publisher + "</td>");
      document.write("<td>" + book.pub_date + "</td>");
      document.write("<td>" + book.num_page + "</td>");
      document.write("</tr>");
    }
    document.write("</tbody>");

    document.write("</table>");
  </script>
</body>

</html>
